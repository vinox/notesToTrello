<!DOCTYPE html>
<!-- saved from url=(0043)file:///C:/Users/denny/Downloads/index.html -->
<html lang="de"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denny → Trello</title>
  <link href="./inde_files/css2" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8f135;
      --accent2: #5b8dee;
      --text: #f0f0f0;
      --muted: #666;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    /* Standardmäßig alles versteckt – leere schwarze Seite ohne Token */
    #app { display: none; }

    header { margin-bottom: 32px; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .status {
      padding: 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .status.success {
      background: rgba(200, 241, 53, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .status.error {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid #ff5050;
      color: #ff5050;
    }

    .status.loading {
      background: rgba(91, 141, 238, 0.1);
      border: 1px solid var(--accent2);
      color: var(--accent2);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent2);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .trello-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--accent);
    }

    .meta {
      margin-top: 16px;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.8;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.65rem;
      margin-top: 24px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- Ohne Token: komplett leere schwarze Seite, nichts zu sehen -->
  <div class="container" id="app">
    <header>
      <h1>Denny <span>→</span> Trello</h1>
      <p class="subtitle">Notizen direkt in die Inbox</p>
    </header>

    <div class="card">
      <div class="status loading" id="status">
        <span class="dot"></span> Karte wird erstellt...
      </div>
      <div class="meta" id="meta"></div>
    </div>

    <footer>DENNY UNIVERSE · TRELLO BRIDGE</footer>
  </div>

  <script>
    const API_KEY = '490a2123b8327ac8bedcc606a63065a2';

    // Board-Kürzel → Inbox Listen-ID
    const LISTS = {
      'LB': '66e15028a83bccc882148a02',  // Denny Life Board Inbox
      'FC': '69c4edb4490b338b4bfe17ba'   // FC Forum Inbox
    };

    async function run() {
      const params = new URLSearchParams(window.location.search);

      const token = params.get('token');
      const board = params.get('board'); // 'LB' oder 'FC'
      const name  = params.get('name');
      const desc  = params.get('desc') || '';
      const due   = params.get('due')  || '';

      // Kein Token, kein Board, kein Name → leere Seite, nichts passiert
      if (!token || !board || !name) return;

      const listId = LISTS[board];
      if (!listId) return;

      // Nur wenn alles vorhanden: App einblenden
      document.getElementById('app').style.display = 'block';

      // Zeige was erstellt wird
      document.getElementById('meta').innerHTML =
        `Board: ${board === 'LB' ? 'Denny Life Board' : 'FC Forum'}<br>` +
        `Titel: ${name}` +
        (desc ? `<br>Beschreibung: ${desc}` : '') +
        (due  ? `<br>Fällig: ${due}`        : '');

      // POST an Trello
      const body = new URLSearchParams({
        key:    API_KEY,
        token:  token,
        idList: listId,
        name:   name,
        desc:   desc,
        pos:    'top'
      });

      if (due) body.append('due', new Date(due).toISOString());

      try {
        const res  = await fetch('https://api.trello.com/1/cards', { method: 'POST', body });
        const data = await res.json();
        const el   = document.getElementById('status');

        if (res.ok) {
          el.className = 'status success';
          el.innerHTML = `✓ Karte erstellt: „${data.name}"` +
            `<br><a class="trello-link" href="${data.shortUrl}" target="_blank">→ In Trello öffnen</a>`;
        } else {
          el.className = 'status error';
          el.innerHTML  = '✗ Fehler: ' + (data.message || res.status);
        }
      } catch (e) {
        const el = document.getElementById('status');
        el.className = 'status error';
        el.innerHTML  = '✗ Netzwerkfehler: ' + e.message;
      }
    }

    run();
  </script>


</body></html>
